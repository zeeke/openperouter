<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="180"
   height="180"
   viewBox="0 0 180 180"
   role="img"
   version="1.1"
   id="svg5"
   sodipodi:docname="logo.svg"
   inkscape:version="1.4.3 (0d15f75042, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/">
  <defs
     id="defs5" />
  <sodipodi:namedview
     id="namedview5"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="2.5591026"
     inkscape:cx="355.20264"
     inkscape:cy="203.19623"
     inkscape:window-width="2560"
     inkscape:window-height="1366"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg5" />
  <title
     id="title1">OpenPERouter logo</title>
  <desc
     id="desc1">Minimalist network routing logo — a hexagonal PE router node with connected host and BGP peer endpoints, plus the OpenPERouter wordmark</desc>
  <style
     id="style1">
.a{fill:#0891B2}
.h{fill:none;stroke:#0891B2;stroke-width:2}
.l{fill:none;stroke:#0891B2;stroke-width:2;stroke-linecap:round}
.wa{fill:#0891B2}
.wl{fill:#64748B}
@media(prefers-color-scheme:dark){
.a{fill:#38BDF8}
.h{stroke:#38BDF8}
.l{stroke:#38BDF8}
.wa{fill:#38BDF8}
.wl{fill:#94A3B8}
}
</style>
  <!-- connector lines -->
  <line
     x1="60"
     y1="90"
     x2="25"
     y2="90"
     class="l"
     id="line1" />
  <line
     x1="126"
     y1="52"
     x2="154"
     y2="30"
     class="l"
     id="line2" />
  <line
     x1="126"
     y1="128"
     x2="154"
     y2="150"
     class="l"
     id="line3" />
  <!-- hexagon outline -->
  <polygon
     points="83,138 61,100 83,62 127,62 149,100 127,138 "
     class="h"
     id="polygon3"
     transform="translate(-1,-10)" />
  <!-- center node -->
  <circle
     cx="104"
     cy="90"
     r="13"
     class="a"
     id="circle3" />
  <!-- west: filled square = host/veth interface -->
  <rect
     x="18"
     y="83"
     width="14"
     height="14"
     rx="2"
     class="a"
     id="rect3" />
  <!-- NE: outlined circle = BGP peer -->
  <circle
     cx="154"
     cy="30"
     r="7"
     class="h"
     id="circle4" />
  <!-- SE: outlined circle = BGP peer -->
  <circle
     cx="154"
     cy="150"
     r="7"
     class="h"
     id="circle5" />
  <metadata
     id="metadata5">
    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:title>OpenPERouter logo</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
</svg>
