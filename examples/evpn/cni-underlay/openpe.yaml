apiVersion: network.openperouter.io/v1alpha1
kind: L3VNI
metadata:
  name: red
  namespace: openperouter-system
spec:
  vrf: red
  hostsession:
    asn: 64514
    hostasn: 64515
    localcidr:
      ipv4: 192.169.10.0/24
  vni: 100
---
apiVersion: network.openperouter.io/v1alpha1
kind: L2VNI
metadata:
  name: layer2
  namespace: openperouter-system
spec:
  vni: 110
  routingDomain:
    type: L3VNI
    l3vni:
      name: red
  hostmaster:
    type: linux-bridge
    linuxBridge:
      autoCreate: true
  gatewayIPs: ["192.170.1.1/24"]
---
# The underlay interface is provisioned by the macvlan CNI plugin on top of
# toswitch1, which stays in the host netns. Since the static address assigned
# by the plugin is node specific, each node gets its own node-scoped Underlay
# selected via nodeSelector.
apiVersion: network.openperouter.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-control-plane
  namespace: openperouter-system
spec:
  asn: 64514
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: pe-kind-control-plane
  tunnelEndpoint:
    cidrs:
    - 100.65.0.0/24
  interfaces:
    - type: CNIDevice
      cniDevice:
        type: RawConfig
        interfaceName: net1
        rawConfig:
          cniVersion: "1.0.0"
          name: macvlan-underlay
          plugins:
            - type: macvlan
              master: toswitch1
              mode: bridge
              ipam:
                type: static
                addresses:
                  - address: 192.168.11.10/24
  neighbors:
    - asn: 64512
      address: 192.168.11.2
---
apiVersion: network.openperouter.io/v1alpha1
kind: Underlay
metadata:
  name: underlay-worker
  namespace: openperouter-system
spec:
  asn: 64514
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: pe-kind-worker
  tunnelEndpoint:
    cidrs:
    - 100.65.0.0/24
  interfaces:
    - type: CNIDevice
      cniDevice:
        type: RawConfig
        interfaceName: net1
        rawConfig:
          cniVersion: "1.0.0"
          name: macvlan-underlay
          plugins:
            - type: macvlan
              master: toswitch1
              mode: bridge
              ipam:
                type: static
                addresses:
                  - address: 192.168.11.11/24
  neighbors:
    - asn: 64512
      address: 192.168.11.2
