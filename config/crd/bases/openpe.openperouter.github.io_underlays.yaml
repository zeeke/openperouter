---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: underlays.openpe.openperouter.github.io
spec:
  group: openpe.openperouter.github.io
  names:
    kind: Underlay
    listKind: UnderlayList
    plural: underlays
    singular: underlay
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Underlay is the Schema for the underlays API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Underlay.
            properties:
              asn:
                description: asn is the local AS number to use for the session with
                  the TOR switch.
                format: int64
                maximum: 4294967295
                minimum: 1
                type: integer
              gracefulRestart:
                description: |-
                  gracefulRestart configures BGP Graceful Restart behaviour.
                  When set, FRR advertises GR capability and preserves forwarding
                  state across restarts so that peers keep stale routes active.
                  Omit to disable graceful restart.
                properties:
                  restartTimeSeconds:
                    default: 120
                    description: |-
                      restartTimeSeconds is the time in seconds that the restarting router
                      requests its peers to preserve routes. Peers will wait this long
                      before removing stale routes.
                    format: int64
                    maximum: 4095
                    minimum: 1
                    type: integer
                  stalePathTimeSeconds:
                    default: 360
                    description: |-
                      stalePathTimeSeconds is the time in seconds that stale paths from a
                      restarting peer are retained locally.
                    format: int64
                    maximum: 4095
                    minimum: 1
                    type: integer
                type: object
              neighbors:
                description: |-
                  neighbors is the list of external BGP neighbors to peer with.
                  Note: MaxItems=128 is arbitrarily chosen to keep total CEL cost low
                  Note: kubeapilinter complained about 'the struct has no required fields', but CEL enforces either/or choices
                  for Address and Interface.
                  Multiple neighbors are supported for connecting to multiple TOR switches
                  or establishing redundant BGP sessions. Each neighbor address must be unique.
                  At least one neighbor is required.
                items:
                  description: Neighbor represents a BGP Neighbor we want FRR to connect
                    to.
                  properties:
                    address:
                      description: |-
                        address is the IP address to establish the session with. The IP address
                        can be either IPv4 or IPv6.
                      maxLength: 39
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: Address must be a valid IPv4 or IPv6 address
                        rule: isIP(self)
                    addressFamilies:
                      description: |-
                        addressFamilies specifies the BGP address families that shall be enabled
                        for this BGP neighbor.
                        If addressFamilies is not provided or empty, the following defaults are
                        chosen:
                        For unnumbered neighbors:
                        - ipv4unicast
                        - ipv6unicast if passthrough is configured with IPv6 local CIDR
                        - evpn if L2VNIs or L3VNIs are present.
                        For IPv4 neighbors:
                        - ipv4unicast
                        - ipv6unicast if passthrough is configured with IPv6 local CIDR
                        - evpn if L2VNIs or L3VNIs are present.
                        For IPv6 neighbors:
                        - ipv4unicast if L2VNIs or L3VNIs are present, or if passthrough is configured with IPv4 local CIDR
                        - ipv6unicast
                        - evpn if L2VNIs or L3VNIs are present
                      items:
                        description: |-
                          NeighborAddressFamily represents a single BGP address family configuration
                          for a neighbor.
                        properties:
                          type:
                            description: type is the address family type.
                            enum:
                            - ipv4unicast
                            - ipv6unicast
                            - evpn
                            maxLength: 11
                            minLength: 1
                            type: string
                        required:
                        - type
                        type: object
                      maxItems: 3
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                    asn:
                      description: asn is the AS number of the neighbor. Either ASN
                        or Type must be set.
                      format: int64
                      maximum: 4294967295
                      minimum: 1
                      type: integer
                    bfd:
                      description: bfd defines the BFD configuration for the BGP session.
                      properties:
                        detectMultiplier:
                          description: |-
                            detectMultiplier configures the detection multiplier to determine
                            packet loss. The remote transmission interval will be multiplied
                            by this value to determine the connection loss detection timer.
                          format: int32
                          maximum: 255
                          minimum: 2
                          type: integer
                        echoInterval:
                          description: |-
                            echoInterval configures the minimal echo receive transmission
                            interval that this system is capable of handling in milliseconds.
                            Defaults to 50ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        echoMode:
                          description: |-
                            echoMode enables or disables the echo transmission mode.
                            This mode is disabled by default, and not supported on multi
                            hops setups.
                          type: boolean
                        minimumTTL:
                          description: |-
                            minimumTTL configures, for multi hop sessions only, the minimum
                            expected TTL for an incoming BFD control packet.
                          format: int32
                          maximum: 254
                          minimum: 1
                          type: integer
                        passiveMode:
                          description: |-
                            passiveMode marks session as passive: a passive session will not
                            attempt to start the connection and will wait for control packets
                            from peer before it begins replying.
                          type: boolean
                        receiveInterval:
                          description: |-
                            receiveInterval is the minimum interval that this system is capable of
                            receiving control packets in milliseconds.
                            Defaults to 300ms.
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        transmitInterval:
                          description: |-
                            transmitInterval is the minimum transmission interval (less jitter)
                            that this system wants to use to send BFD control packets in
                            milliseconds. Defaults to 300ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                      type: object
                    connectTimeSeconds:
                      description: connectTimeSeconds controls how long BGP waits
                        between connection attempts to a neighbor, in seconds.
                      format: int64
                      maximum: 65535
                      minimum: 1
                      type: integer
                    ebgpMultiHop:
                      description: ebgpMultiHop indicates if the BGPPeer is multi-hops
                        away.
                      type: boolean
                    holdTimeSeconds:
                      description: |-
                        holdTimeSeconds is the requested BGP hold time in seconds, per RFC4271.
                        Defaults to 180.
                      format: int64
                      type: integer
                    interface:
                      description: interface is the interface name for BGP unnumbered
                        sessions. The session will be established via IPv6 link locals.
                      maxLength: 15
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: Interface must not contain /, :, or whitespace
                        rule: self.matches('^[^\\/:\\s]+$')
                      - message: Interface cannot be . or ..
                        rule: self != '.' && self != '..'
                    keepaliveTimeSeconds:
                      description: |-
                        keepaliveTimeSeconds is the requested BGP keepalive time in seconds, per RFC4271.
                        Defaults to 60.
                      format: int64
                      type: integer
                    password:
                      description: |-
                        password to be used for establishing the BGP session.
                        Password and PasswordSecret are mutually exclusive.
                      type: string
                    passwordSecret:
                      description: |-
                        passwordSecret is name of the authentication secret for the neighbor.
                        the secret must be of type "kubernetes.io/basic-auth", and created in the
                        same namespace as the perouter daemon. The password is stored in the
                        secret as the key "password".
                        Password and PasswordSecret are mutually exclusive.
                      type: string
                    port:
                      description: |-
                        port is the port to dial when establishing the session.
                        Defaults to 179.
                      format: int32
                      maximum: 16384
                      minimum: 0
                      type: integer
                    type:
                      description: type is the AS type of the neighbor. Either ASN
                        or Type must be set.
                      enum:
                      - external
                      - internal
                      type: string
                  type: object
                  x-kubernetes-validations:
                  - message: either ASN or Type must be set
                    rule: has(self.asn) || has(self.type)
                  - message: ASN and Type cannot be set together
                    rule: '!has(self.asn) || !has(self.type)'
                  - message: holdTimeSeconds and keepaliveTimeSeconds must be both
                      set or both unset
                    rule: has(self.holdTimeSeconds) == has(self.keepaliveTimeSeconds)
                  - message: holdTimeSeconds must be 0 or >=3
                    rule: '!has(self.holdTimeSeconds) || self.holdTimeSeconds == 0
                      || self.holdTimeSeconds >= 3'
                  - message: keepaliveTimeSeconds must be lower than or equal to holdTimeSeconds
                    rule: '!has(self.holdTimeSeconds) || !has(self.keepaliveTimeSeconds)
                      || self.keepaliveTimeSeconds <= self.holdTimeSeconds'
                  - message: Either a valid Address or Interface name must be provided
                      for Neighbor
                    rule: has(self.address) || has(self.interface)
                  - message: Address and Interface cannot be set together for Neighbor
                    rule: '!has(self.address) || !has(self.interface)'
                maxItems: 128
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
              nics:
                description: |-
                  nics is the list of physical nics to move under the PERouter namespace to connect
                  to external routers. At least one NIC is required.
                items:
                  maxLength: 15
                  pattern: ^[a-zA-Z][a-zA-Z0-9._-]*$
                  type: string
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
              nodeSelector:
                description: |-
                  nodeSelector specifies which nodes this Underlay applies to.
                  If empty or not specified, applies to all nodes (backward compatible).
                  Multiple Underlays with overlapping node selectors will be rejected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              routeridcidr:
                default: 10.0.0.0/24
                description: routeridcidr is the ipv4 cidr to be used to assign a
                  different routerID on each node.
                type: string
              tunnelEndpoint:
                description: tunnelEndpoint contains tunnel endpoint configuration
                  for the underlay.
                properties:
                  cidrs:
                    description: |-
                      cidrs is a list of CIDRs to be used to assign IPs to the local tunnel endpoint on
                      each node. A loopback interface will be created with IPs derived from
                      these CIDRs. At least one IPv4 or IPv6 CIDR is required. At most one of each family may be specified.
                    items:
                      type: string
                    maxItems: 2
                    minItems: 1
                    type: array
                    x-kubernetes-list-type: atomic
                    x-kubernetes-validations:
                    - message: all entries must be valid CIDRs
                      rule: self.all(c, isCIDR(c))
                    - message: at most one IPv4 CIDR is allowed
                      rule: self.filter(c, isCIDR(c) && cidr(c).ip().family() == 4).size()
                        <= 1
                    - message: at most one IPv6 CIDR is allowed
                      rule: self.filter(c, isCIDR(c) && cidr(c).ip().family() == 6).size()
                        <= 1
                required:
                - cidrs
                type: object
            required:
            - asn
            - neighbors
            - nics
            type: object
          status:
            description: status defines the observed state of Underlay.
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
