          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: quay.io/openperouter/router:main
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: webhook-server
            scheme: HTTPS
        name: nodemarker
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: webhook-server
            scheme: HTTPS
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
      serviceAccountName: controller
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
