  names:
    kind: Underlay
    listKind: UnderlayList
    plural: underlays
    singular: underlay
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Underlay is the Schema for the underlays API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Underlay.
            properties:
              asn:
                description: asn is the local AS number to use for the session with
                  the TOR switch.
                format: int64
                maximum: 4294967295
                minimum: 1
                type: integer
              gracefulRestart:
                description: |-
                  gracefulRestart configures BGP Graceful Restart behaviour.
                  When set, FRR advertises GR capability and preserves forwarding
                  state across restarts so that peers keep stale routes active.
                  Omit to disable graceful restart.
                properties:
                  restartTimeSeconds:
                    default: 120
                    description: |-
                      restartTimeSeconds is the time in seconds that the restarting router
                      requests its peers to preserve routes. Peers will wait this long
                      before removing stale routes.
                    format: int64
                    maximum: 4095
                    minimum: 1
                    type: integer
                  stalePathTimeSeconds:
                    default: 360
                    description: |-
                      stalePathTimeSeconds is the time in seconds that stale paths from a
                      restarting peer are retained locally.
                    format: int64
                    maximum: 4095
                    minimum: 1
                    type: integer
                type: object
              interfaces:
                description: |-
                  interfaces is the list of interfaces the router uses for underlay
                  connectivity. Each entry is a discriminated union describing how the
                  interface is obtained. At least one interface is required. All the
                  entries must be of the same type: mixing NetworkDevice and CNIDevice
                  interfaces is not supported.
                items:
                  description: |-
                    UnderlayInterface defines how the router obtains a single underlay link.
                    Exactly one of the sub-structs must match the type field.
                    The union is designed to be extended with future modes
                    for controller-provisioned interfaces.
                  properties:
                    cniDevice:
                      description: |-
                        cniDevice invokes a CNI plugin to provision an interface in the router
                        netns. IPAM is delegated to the CNI plugin. Must be set when type is
                        "CNIDevice".
                      properties:
                        interfaceName:
                          default: net1
                          description: |-
                            interfaceName is the name of the interface the CNI plugin creates
                            inside the router netns (passed as CNI_IFNAME). Defaults to "net1".
                          maxLength: 15
                          minLength: 1
                          pattern: ^[a-zA-Z][a-zA-Z0-9._-]*$
                          type: string
                        rawConfig:
                          description: |-
                            rawConfig embeds a CNI conflist JSON blob directly in this spec.
                            Only CNI spec >= 1.0.0 configurations are accepted. Immutable once
                            set: to change it, delete and recreate the
                            Underlay. Immutability is enforced by the validation webhook because
                            CEL transition rules cannot be evaluated inside atomic lists.
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        runtimeConfig:
                          description: |-
                            runtimeConfig is an opaque JSON object mapping CNI capability names
                            to the payloads passed as capability arguments to the CNI
                            invocation. Only keys that the plugin declares in its
                            "capabilities" config block are forwarded; undeclared keys are
                            silently stripped. Well-known capabilities include ips, mac,
                            bandwidth, portMappings, ipRanges and deviceID. Immutable once
                            set: to change it, delete and recreate the Underlay. Immutability
                            is enforced by the validation webhook because CEL transition rules
                            cannot be evaluated inside atomic lists.
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        type:
                          description: type selects the source of the CNI configuration.
                          enum:
                          - RawConfig
                          type: string
                      required:
                      - type
                      type: object
                      x-kubernetes-validations:
                      - message: 'type/config mismatch: rawConfig must be set if and
                          only if type is ''RawConfig'''
                        rule: has(self.rawConfig) == (self.type == 'RawConfig')
                    networkDevice:
                      description: |-
                        networkDevice moves an existing host network device into the router netns.
                        The device can be of any kind (physical NIC, bridge, macvlan, etc.).
                        Must be set when type is "NetworkDevice".
                      properties:
                        interfaceName:
                          description: |-
                            interfaceName is the name of the host network device to move into
                            the router netns.
                          maxLength: 15
                          minLength: 1
                          pattern: ^[a-zA-Z][a-zA-Z0-9._-]*$
                          type: string
                      required:
                      - interfaceName
                      type: object
                    type:
                      description: type selects how the router obtains this underlay
                        link.
                      enum:
                      - NetworkDevice
                      - CNIDevice
                      type: string
                  required:
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: 'type/config mismatch: networkDevice must be set if and
                      only if type is ''NetworkDevice'''
                    rule: has(self.networkDevice) == (self.type == 'NetworkDevice')
                  - message: 'type/config mismatch: cniDevice must be set if and only
                      if type is ''CNIDevice'''
                    rule: has(self.cniDevice) == (self.type == 'CNIDevice')
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
                x-kubernetes-validations:
                - message: all interfaces must be of the same type, mixing NetworkDevice
                    and CNIDevice is not supported
                  rule: self.all(i, i.type == self[0].type)
              isis:
                description: isis holds the ISIS configuration for the underlay.
                properties:
                  baseNet:
                    description: |-
                      baseNet holds the ISIS NET address.
                      The configured Net address is a base address which is offset by the node index of each node.
                      Only accepts the simplified NSAP format with a fixed AreaID length of 3 bytes and a 6 byte SystemID in compliance
                      with the U.S. GOSIP version 2.0 for a total of 10 bytes.
                    maxLength: 25
                    minLength: 25
                    type: string
                    x-kubernetes-validations:
                    - message: Provided net address must match canonical format
                      rule: self.matches('^[0-9a-f]{2}\\.([0-9a-f]{4}\\.){4}[0-9a-f]{2}$')
                  features:
                    description: |-
                      features enables ISIS boolean features.
                      Supported features are:
                      advertisePassiveOnly: configures ISIS to advertise only prefixes that belong to passive interfaces.
                    items:
                      description: ISISFeature represents a single ISIS feature.
                      enum:
                      - advertisePassiveOnly
                      maxLength: 128
                      minLength: 1
                      type: string
                    maxItems: 32
                    type: array
                    x-kubernetes-list-type: atomic
                  interfaces:
                    description: |-
                      interfaces holds additional ISIS interface level configuration and / or per
                      interface overrides. By default, OpenPERouter enables IPv6 on all required
                      interfaces with default settings.
                    items:
                      description: ISISInterface holds ISIS interface level configuration.
                      properties:
                        features:
                          description: |-
                            features enables ISIS interface boolean features.
                            Supported features are:
                            passive: configures ISIS passive mode on this interface.
                          items:
                            description: ISISInterfaceFeature represents a single
                              ISIS feature of an ISIS interface.
                            enum:
                            - passive
                            maxLength: 128
                            minLength: 1
                            type: string
                          maxItems: 32
                          type: array
                          x-kubernetes-list-type: atomic
                        ipFamily:
                          description: ipFamily configures which address families
                            ISIS is enabled for on this interface.
                          enum:
                          - ipv4
                          - ipv6
                          - dualstack
                          type: string
                        name:
                          description: name of the interface that these settings shall
                            apply to.
                          maxLength: 15
                          minLength: 1
                          type: string
                          x-kubernetes-validations:
                          - message: Interface must not contain /, :, or whitespace
                            rule: self.matches('^[^\\/:\\s]+$')
                          - message: Interface cannot be . or ..
                            rule: self != '.' && self != '..'
                      required:
                      - name
                      type: object
                    maxItems: 128
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  level:
                    description: level configures the ISIS type, system wide. It defaults
                      to level-1-2 unless specified otherwise.
                    enum:
                    - 1
                    - 2
                    format: int32
                    type: integer
                required:
                - baseNet
                type: object
              neighbors:
                description: |-
                  neighbors is the list of external BGP neighbors to peer with.
                  Multiple neighbors are supported for connecting to multiple TOR switches
                  or establishing redundant BGP sessions. Each neighbor address must be unique.
                  At least one neighbor is required.
                items:
                  description: Neighbor represents a BGP Neighbor we want FRR to connect
                    to.
                  properties:
                    address:
                      description: |-
                        address is the IP address to establish the session with. The IP address
                        can be either IPv4 or IPv6.
                      maxLength: 39
                      minLength: 1
                      type: string
                      x-kubernetes-validations:
                      - message: Address must be a valid IPv4 or IPv6 address
                        rule: isIP(self)
                    addressFamilies:
                      description: |-
                        addressFamilies specifies the BGP address families that shall be enabled
                        for this BGP neighbor. evpn and ipv4vpn/ipv6vpn are mutually exclusive.
                        If ipv4vpn or ipv6vpn are set, the update source of this neighbor will
                        be set to the loopback's IPv6 address.
                        If addressFamilies is not provided or empty, the following defaults are
                        chosen:
                        For unnumbered neighbors:
                        - ipv4unicast
                        - ipv6unicast if passthrough is configured with IPv6 local CIDR
                        - evpn if L2VNIs or L3VNIs are present.
                        For IPv4 neighbors:
                        - ipv4unicast
                        - ipv6unicast if passthrough is configured with IPv6 local CIDR
                        - evpn if L2VNIs or L3VNIs are present.
                        For IPv6 neighbors:
                        - ipv4unicast if L2VNIs or L3VNIs are present, or if passthrough is configured with IPv4 local CIDR
                        - ipv6unicast
                        - evpn if L2VNIs or L3VNIs are present
                        - ipv4vpn if L3VPNs and SRv6 configuration are present.
                        - ipv6vpn if L3VPNs and SRv6 configuration are present.
                      items:
                        description: |-
                          NeighborAddressFamily represents a single BGP address family configuration
                          for a neighbor.
                        properties:
                          type:
                            description: type is the address family type.
                            enum:
                            - ipv4unicast
                            - ipv6unicast
                            - evpn
                            - ipv4vpn
                            - ipv6vpn
                            maxLength: 11
                            minLength: 1
                            type: string
                        required:
                        - type
                        type: object
                      maxItems: 4
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                      x-kubernetes-validations:
                      - message: EVPN and IPv4VPN/IPv6VPN address families are mutually
                          exclusive
                        rule: '!(self.exists(f, f.type == ''evpn'') && self.exists(f,
                          f.type == ''ipv4vpn'' || f.type == ''ipv6vpn''))'
                    asn:
                      description: asn is the AS number of the neighbor. Either ASN
                        or Type must be set.
                      format: int64
                      maximum: 4294967295
                      minimum: 1
                      type: integer
                    bfd:
                      description: bfd defines the BFD configuration for the BGP session.
                      properties:
                        detectMultiplier:
                          description: |-
                            detectMultiplier configures the detection multiplier to determine
                            packet loss. The remote transmission interval will be multiplied
                            by this value to determine the connection loss detection timer.
                          format: int32
                          maximum: 255
                          minimum: 2
                          type: integer
                        echoInterval:
                          description: |-
                            echoInterval configures the minimal echo receive transmission
                            interval that this system is capable of handling in milliseconds.
                            Defaults to 50ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        echoMode:
                          description: |-
                            echoMode enables or disables the echo transmission mode.
                            This mode is disabled by default, and not supported on multi
                            hops setups.
                          type: boolean
                        minimumTTL:
                          description: |-
                            minimumTTL configures, for multi hop sessions only, the minimum
                            expected TTL for an incoming BFD control packet.
                          format: int32
                          maximum: 254
                          minimum: 1
                          type: integer
                        passiveMode:
                          description: |-
                            passiveMode marks session as passive: a passive session will not
                            attempt to start the connection and will wait for control packets
                            from peer before it begins replying.
                          type: boolean
                        receiveInterval:
                          description: |-
                            receiveInterval is the minimum interval that this system is capable of
                            receiving control packets in milliseconds.
                            Defaults to 300ms.
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        transmitInterval:
                          description: |-
                            transmitInterval is the minimum transmission interval (less jitter)
                            that this system wants to use to send BFD control packets in
                            milliseconds. Defaults to 300ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                      type: object
                    connectTimeSeconds:
                      description: connectTimeSeconds controls how long BGP waits
                        between connection attempts to a neighbor, in seconds.
                      format: int64
                      maximum: 65535
                      minimum: 1
                      type: integer
                    ebgpMultiHop:
                      description: ebgpMultiHop indicates if the BGPPeer is multi-hops
