apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/component: controller
    app.kubernetes.io/created-by: controller
    app.kubernetes.io/instance: controller
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: controller
    app.kubernetes.io/part-of: controller
    control-plane: controller
  name: controller
  namespace: openperouter-system
spec:
  selector:
    matchLabels:
      control-plane: controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: controller
      labels:
        app: controller
        control-plane: controller
    spec:
      containers:
      - args:
        - --nodename=$(NODE_NAME)
        - --loglevel=debug
        - --namespace=$(NAMESPACE)
        - --frrconfig=/etc/frr/frr.conf
        - --reloader-socket=/etc/frr/reload.sock
        - --cni-plugin-dirs=/opt/openperouter/cni/bin/
        - --cni-cache-dir=/var/lib/openperouter/cni/cache
        command:
        - /controller
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: quay.io/openperouter/router:main
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 9081
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 1
        name: controller
        ports:
        - containerPort: 9081
          name: health
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: 9081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
            - NET_BIND_SERVICE
          privileged: true
        volumeMounts:
        - mountPath: /containerd.sock
          name: varrun
          subPath: containerd.sock
        - mountPath: /run/netns
          mountPropagation: Bidirectional
          name: runns
        - mountPath: /etc/frr/
          mountPropagation: HostToContainer
          name: frr-config
        - mountPath: /var/run/openvswitch
          mountPropagation: HostToContainer
          name: ovs-var-run
        - mountPath: /var/run/frr
          name: frr-sockets
        - mountPath: /var/lib/openperouter/cni/cache
          name: cni-cache
      hostNetwork: true
      hostPID: true
      serviceAccountName: controller
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
      - hostPath:
          path: /run/netns
        name: runns
      - hostPath:
          path: /run/containerd
        name: varrun
      - hostPath:
          path: /etc/perouter/frr
          type: DirectoryOrCreate
        name: frr-config
      - hostPath:
          path: /var/run/openvswitch
        name: ovs-var-run
      - hostPath:
          path: /var/run/openperouter/frr
          type: DirectoryOrCreate
        name: frr-sockets
      - hostPath:
          path: /var/lib/openperouter/cni/cache
          type: DirectoryOrCreate
        name: cni-cache
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/component: router
    app.kubernetes.io/created-by: router
    app.kubernetes.io/instance: router
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: router
    app.kubernetes.io/part-of: router
    control-plane: router
  name: router
  namespace: openperouter-system
spec:
  selector:
    matchLabels:
      control-plane: router
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: frr
      labels:
        app: router
        control-plane: router
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          TIMEOUT=60
          WAITED=0
          until [ -e /var/run/netns/perouter ]; do
            echo "Waiting for named netns /var/run/netns/perouter..."
            sleep 1
            WAITED=$((WAITED + 1))
            if [ "$WAITED" -ge "$TIMEOUT" ]; then
              echo "Timed out waiting for named netns after ${TIMEOUT}s"
              exit 1
            fi
          done
          exec nsenter --net=/var/run/netns/perouter /sbin/tini -- /usr/lib/frr/docker-start
        env:
        - name: TINI_SUBREAPER
          value: "true"
        image: quay.io/openperouter/router:main
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 9080
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 10
        name: frr
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
            - NET_BIND_SERVICE
            - SETUID
            - SETGID
            - CHOWN
            - DAC_OVERRIDE
            drop:
            - ALL
          seccompProfile:
            type: Unconfined
        volumeMounts:
        - mountPath: /var/run/frr
          name: frr-sockets
        - mountPath: /etc/frr
          name: frrconfig
        - mountPath: /var/run/netns
          mountPropagation: HostToContainer
          name: netns
          readOnly: true
      - args:
        - --frrconfig=/etc/perouter/frr.conf
        - --loglevel=debug
        - --unixsocket=/etc/perouter/reload.sock
        command:
        - /reloader
        image: quay.io/openperouter/router:main
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 9080
