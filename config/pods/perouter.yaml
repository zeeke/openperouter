apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: router
  namespace: system
  labels:
    control-plane: router
    app.kubernetes.io/name: router
    app.kubernetes.io/instance: router
    app.kubernetes.io/component: router
    app.kubernetes.io/created-by: router
    app.kubernetes.io/part-of: router
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: router
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: frr
      labels:
        control-plane: router
        app: router
    spec:
      containers:
      - name: frr
        securityContext:
          capabilities:
            add: ["NET_ADMIN", "NET_RAW", "SYS_ADMIN", "NET_BIND_SERVICE"]
        image: router:latest
        imagePullPolicy: IfNotPresent
        env:
          - name: TINI_SUBREAPER
            value: "true"
        volumeMounts:
          - name: frr-sockets
            mountPath: /var/run/frr
          - name: frrconfig
            mountPath: /etc/frr
        command:
          - /bin/sh
          - -c
          - |
            exec /sbin/tini -- /usr/lib/frr/docker-start
      - name: reloader
        image: router:latest
        imagePullPolicy: IfNotPresent
        command: ["/reloader"]
        args:
        - "--frrconfig=/etc/perouter/frr.conf"
        - "--loglevel=debug"
        - "--unixsocket=/etc/perouter/reload.sock"
        securityContext: 
          seLinuxOptions:
            type: spc_t
        volumeMounts:
          - name: frrconfig
            mountPath: /etc/frr
          - name: frr-sockets
            mountPath: /var/run/frr
          - name: frrsharedconfig
            mountPath: /etc/perouter
        ports:
        - containerPort: 9080
          name: health
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9080
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 1
          failureThreshold: 3
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
        operator: Exists
      volumes:
        - name: frr-sockets
          emptyDir: {}
        - name: frr-startup
          configMap:
            name: frr-startup
        - name: frrsharedconfig
          hostPath:
            path: /etc/perouter/frr
            type: DirectoryOrCreate
        - name: frrconfig
          emptyDir: {}
      initContainers:
        # Copies the initial config files with the right permissions to the shared volume.
        - name: cp-frr-files
          image: router:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "cp -rLf /tmp/frr/* /etc/frr/"]
          volumeMounts:
            - name: frr-startup
              mountPath: /tmp/frr
            - name: frrconfig
              mountPath: /etc/frr
      serviceAccountName: perouter
      terminationGracePeriodSeconds: 10
      shareProcessNamespace: true
