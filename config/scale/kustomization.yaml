apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../default

patches:
- target:
    kind: DaemonSet
    name: controller
  patch: |-
    - op: remove
      path: /spec/template/spec/containers/0/resources
- target:
    kind: Deployment
    name: nodemarker
  patch: |-
    - op: remove
      path: /spec/template/spec/containers/0/resources
