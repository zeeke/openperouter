<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="460"
   height="180"
   viewBox="0 0 460 180"
   role="img"
   version="1.1"
   id="svg7"
   sodipodi:docname="logo_text.svg"
   inkscape:version="1.4.3 (0d15f75042, 2025-12-25)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:dc="http://purl.org/dc/elements/1.1/">
  <defs
     id="defs7" />
  <sodipodi:namedview
     id="namedview7"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="2.5591026"
     inkscape:cx="293.07148"
     inkscape:cy="138.32974"
     inkscape:window-width="2560"
     inkscape:window-height="1366"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg7" />
  <title
     id="title1">OpenPERouter logo</title>
  <desc
     id="desc1">Minimalist network routing logo — a hexagonal PE router node with connected host and BGP peer endpoints, plus the OpenPERouter wordmark</desc>
  <style
     id="style1">
.a{fill:#0891B2}
.h{fill:none;stroke:#0891B2;stroke-width:2}
.l{fill:none;stroke:#0891B2;stroke-width:2;stroke-linecap:round}
.wa{fill:#0891B2}
.wl{fill:#64748B}
@media(prefers-color-scheme:dark){
.a{fill:#38BDF8}
.h{stroke:#38BDF8}
.l{stroke:#38BDF8}
.wa{fill:#38BDF8}
.wl{fill:#94A3B8}
}
</style>
  <!-- connector lines -->
  <line
     x1="64.730011"
     y1="90"
     x2="29.730015"
     y2="90"
     class="l"
     id="line1" />
  <line
     x1="130.73001"
     y1="52"
     x2="158.73001"
     y2="30"
     class="l"
     id="line2" />
  <line
     x1="130.73001"
     y1="128"
     x2="158.73001"
     y2="150"
     class="l"
     id="line3" />
  <!-- hexagon outline -->
  <polygon
     points="83,62 127,62 149,100 127,138 83,138 61,100 "
     class="h"
     id="polygon3"
     transform="translate(3.7300148,-10)" />
  <!-- center node -->
  <circle
     cx="108.73001"
     cy="90"
     r="13"
     class="a"
     id="circle3" />
  <!-- west: filled square = host/veth interface -->
  <rect
     x="22.730015"
     y="83"
     width="14"
     height="14"
     rx="2"
     class="a"
     id="rect3" />
  <!-- NE: outlined circle = BGP peer -->
  <circle
     cx="158.73001"
     cy="30"
     r="7"
     class="h"
     id="circle4" />
  <!-- SE: outlined circle = BGP peer -->
  <circle
     cx="158.73001"
     cy="150"
     r="7"
     class="h"
     id="circle5" />
  <!-- thin separator -->
  <line
     x1="186.73001"
     y1="48"
     x2="186.73001"
     y2="132"
     stroke="#cbd5e1"
     stroke-width="1"
     opacity="0.6"
     id="line5" />
  <!-- Wordmark -->
  <text
     y="105"
     font-family="system-ui, '-apple-system', sans-serif"
     font-size="36px"
     font-weight="400"
     letter-spacing="-0.5"
     id="text7"
     x="3.7300148"><tspan
       x="203.73001"
       class="wl"
       id="tspan5">Open</tspan><tspan
       class="wa"
       font-weight="700"
       id="tspan6">PE</tspan><tspan
       class="wl"
       id="tspan7">Router</tspan></text>
  <metadata
     id="metadata7">
    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:title>OpenPERouter logo</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
</svg>
