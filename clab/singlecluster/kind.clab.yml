name: kind
topology:
  groups:
    frr:
      kind: linux
      image: quay.io/frrouting/frr:10.6.0
      binds:
        - ../frrcommon/daemons:/etc/frr/daemons
        - ../frrcommon/vtysh.conf:/etc/frr/vtysh.conf
      exec:
        - sysctl -w net.ipv6.conf.all.forwarding=1
    agnhost:
      kind: linux
      image: "k8s.gcr.io/e2e-test-images/agnhost:2.40"
      cmd: netexec --http-port=8090

  nodes:
    leafA:
      group: frr
      binds:
        - ../leafA/frr.conf:/etc/frr/frr.conf
        - ../leafA/setup.sh:/setup.sh
    leafB:
      group: frr
      binds:
        - ../leafB/frr.conf:/etc/frr/frr.conf
        - ../leafB/setup.sh:/setup.sh
    leafSRV6:
      group: frr
      binds:
        - ../leafSRV6/frr.conf:/etc/frr/frr.conf
        - ../leafSRV6/setup.sh:/setup.sh
    leafkind1:
      group: frr
      binds:
        - leafkind1/frr.conf:/etc/frr/frr.conf
    leafkind2:
      group: frr
      binds:
        - leafkind2/frr.conf:/etc/frr/frr.conf
    spine:
      group: frr
      binds:
        - spine/frr.conf:/etc/frr/frr.conf

    hostA_default:
      group: agnhost
      binds:
        - ../hostA_default/setup.sh:/setup.sh
    hostA_red:
      group: agnhost
      binds:
        - ../hostA_red/setup.sh:/setup.sh
    hostB_red:
      group: agnhost
      binds:
        - ../hostB_red/setup.sh:/setup.sh
    hostSRV6_red:
      group: agnhost
      binds:
        - ../hostSRV6_red/setup.sh:/setup.sh
    hostA_blue:
      group: agnhost
      binds:
        - ../hostA_blue/setup.sh:/setup.sh
    hostB_blue:
      group: agnhost
      binds:
        - ../hostB_blue/setup.sh:/setup.sh
    hostSRV6_blue:
      group: agnhost
      binds:
        - ../hostSRV6_blue/setup.sh:/setup.sh

    leafkind1-sw:
      kind: bridge

    leafkind2-sw:
      kind: bridge

    pe-kind:
      kind: k8s-kind
      startup-config: ../pe-kind-configuration-registry.yaml
    pe-kind-control-plane:
      kind: ext-container
    pe-kind-worker:
      kind: ext-container

  links:
    - endpoints: ["leafA:eth1", "spine:eth1"]
    - endpoints: ["leafB:eth1", "spine:eth2"]
    - endpoints: ["leafSRV6:eth1", "spine:ethsrv6"]
    - endpoints: ["leafkind1:eth1", "spine:eth3"]
    - endpoints: ["leafkind2:eth1", "spine:eth4"]
    - endpoints: ["leafA:ethred", "hostA_red:eth1"]
    - endpoints: ["leafA:ethdefault", "hostA_default:eth1"]
    - endpoints: ["leafA:ethblue", "hostA_blue:eth1"]
    - endpoints: ["leafB:ethred", "hostB_red:eth1"]
    - endpoints: ["leafB:ethblue", "hostB_blue:eth1"]
    - endpoints: ["leafSRV6:ethred", "hostSRV6_red:eth1"]
    - endpoints: ["leafSRV6:ethblue", "hostSRV6_blue:eth1"]
    - endpoints: ["leafkind1:toswitch1", "leafkind1-sw:leaf1"]
    - endpoints: ["leafkind2:toswitch2", "leafkind2-sw:leaf2"]
    # Point to point links for IPv6 unnumbered BGP sessions.
    - endpoints: ["leafkind1:tokindworker", "pe-kind-worker:toleafkind1"]
    - endpoints: ["leafkind2:tokindworker", "pe-kind-worker:toleafkind2"]
    - endpoints: ["leafkind1:tokindctrlpl", "pe-kind-control-plane:toleafkind1"]
    - endpoints: ["leafkind2:tokindctrlpl", "pe-kind-control-plane:toleafkind2"]

    # All kind nodes connect to both leaf switches for redundancy
    - endpoints: ["pe-kind-control-plane:toswitch1", "leafkind1-sw:kindctrlpl1"]
    - endpoints: ["pe-kind-worker:toswitch1", "leafkind1-sw:kindworker1"]
    - endpoints: ["pe-kind-control-plane:toswitch2", "leafkind2-sw:kindctrlpl2"]
    - endpoints: ["pe-kind-worker:toswitch2", "leafkind2-sw:kindworker2"]
