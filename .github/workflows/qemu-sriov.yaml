name: QEMU SR-IOV

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths-ignore:
      - 'DCO'
      - 'LICENSE'
      - 'README.md'
      - 'HOW_TO_RELEASE.md'
      - 'RELEASE_NOTES.md'
    branches:
      - "main"
      - "*-dev"
      - "v**"
  merge_group:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qemu-sriov-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: hack/qemu-sriov
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Enable /dev/kvm access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU and cloud-image tools
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils cloud-image-utils

      - name: Build cloud-init seed
        run: ./build-cloud-init-seed.sh

      - name: Boot VM
        run: ./boot-vm.sh

      # Build the grout image while the VM boots and installs k3s in the
      # background, so the two slow steps overlap. main-grout is never published
      # to a registry, so it is imported straight into k3s further down.
      - name: Build grout image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.grout
          tags: quay.io/openperouter/router:main-grout
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Wait for SSH
        run: ./wait-for-ssh.sh

      - name: Wait for k3s node to be Ready
        run: ./wait-for-k3s-ready.sh

      - name: Verify SR-IOV setup
        run: ./verify-sriov-setup.sh

      - name: Import grout image into k3s
        run: ./import-image-to-k3s.sh quay.io/openperouter/router:main-grout

      - name: Prepare the node for openperouter
        run: ./prepare-perouter-host.sh

      - name: Deploy openperouter with grout
        working-directory: ${{ github.workspace }}
        # Pass KUBECONFIG as a make command-line variable: the Makefile globally
        # does `export KUBECONFIG=bin/kubeconfig` for the kind lanes, which would
        # otherwise clobber the VM kubeconfig and point kubectl/helm at no cluster.
        run: make deploy-grout-helm KUBECONFIG="$KUBECONFIG"

      - name: Smoke-test cluster stability
        env:
          KUBECTL: ${{ github.workspace }}/bin/kubectl
        run: ./smoke-test.sh

      - name: Test underlay nic move into the perouter netns
        run: ./underlay-test.sh

      - name: Dump console log on failure
        if: ${{ failure() }}
        run: cat "$GITHUB_WORKSPACE/bin/qemu/console.log"

      - name: Tear down VM
        if: ${{ always() }}
        run: ./teardown-vm.sh
