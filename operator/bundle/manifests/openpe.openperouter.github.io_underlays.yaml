apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  creationTimestamp: null
  name: underlays.openpe.openperouter.github.io
spec:
  group: openpe.openperouter.github.io
  names:
    kind: Underlay
    listKind: UnderlayList
    plural: underlays
    singular: underlay
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Underlay is the Schema for the underlays API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Underlay.
            properties:
              asn:
                description: asn is the local AS number to use for the session with
                  the TOR switch.
                format: int64
                maximum: 4294967295
                minimum: 1
                type: integer
              evpn:
                description: evpn contains EVPN-VXLAN configuration for the underlay.
                properties:
                  vtepCIDR:
                    description: |-
                      vtepCIDR is the CIDR to be used to assign IPs to the local VTEP on each node.
                      A loopback interface will be created with an IP derived from this CIDR.
                      Mutually exclusive with vtepInterface.
                    type: string
                  vtepInterface:
                    description: |-
                      vtepInterface is the name of an existing interface to use as the VTEP source.
                      The interface must already have an IP address configured that will be used
                      as the VTEP IP. Mutually exclusive with vtepCIDR.
                      The ToR must advertise the interface IP into the fabric underlay
                      (e.g. via redistribute connected) so that the VTEP address is reachable
                      from other leaves.
                    maxLength: 15
                    pattern: ^[a-zA-Z][a-zA-Z0-9._-]*$
                    type: string
                type: object
                x-kubernetes-validations:
                - message: exactly one of vtepCIDR or vtepInterface must be specified
                  rule: (self.?vtepCIDR.orValue("") != "") != (self.?vtepInterface.orValue("")
                    != "")
              neighbors:
                description: neighbors is the list of external neighbors to peer with.
                items:
                  description: Neighbor represents a BGP Neighbor we want FRR to connect
                    to.
                  properties:
                    address:
                      description: address is the IP address to establish the session
                        with.
                      minLength: 1
                      type: string
                    asn:
                      description: asn is the AS number of the neighbor. Either ASN
                        or Type must be set.
                      format: int64
                      maximum: 4294967295
                      minimum: 1
                      type: integer
                    bfd:
                      description: bfd defines the BFD configuration for the BGP session.
                      properties:
                        detectMultiplier:
                          description: |-
                            detectMultiplier configures the detection multiplier to determine
                            packet loss. The remote transmission interval will be multiplied
                            by this value to determine the connection loss detection timer.
                          format: int32
                          maximum: 255
                          minimum: 2
                          type: integer
                        echoInterval:
                          description: |-
                            echoInterval configures the minimal echo receive transmission
                            interval that this system is capable of handling in milliseconds.
                            Defaults to 50ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        echoMode:
                          description: |-
                            echoMode enables or disables the echo transmission mode.
                            This mode is disabled by default, and not supported on multi
                            hops setups.
                          type: boolean
                        minimumTTL:
                          description: |-
                            minimumTTL configures, for multi hop sessions only, the minimum
                            expected TTL for an incoming BFD control packet.
                          format: int32
                          maximum: 254
                          minimum: 1
                          type: integer
                        passiveMode:
                          description: |-
                            passiveMode marks session as passive: a passive session will not
                            attempt to start the connection and will wait for control packets
                            from peer before it begins replying.
                          type: boolean
                        receiveInterval:
                          description: |-
                            receiveInterval is the minimum interval that this system is capable of
                            receiving control packets in milliseconds.
                            Defaults to 300ms.
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                        transmitInterval:
                          description: |-
                            transmitInterval is the minimum transmission interval (less jitter)
                            that this system wants to use to send BFD control packets in
                            milliseconds. Defaults to 300ms
                          format: int32
                          maximum: 60000
                          minimum: 10
                          type: integer
                      type: object
                    connectTimeSeconds:
                      description: connectTimeSeconds controls how long BGP waits
                        between connection attempts to a neighbor, in seconds.
                      format: int64
                      maximum: 65535
                      minimum: 1
                      type: integer
                    ebgpMultiHop:
                      description: ebgpMultiHop indicates if the BGPPeer is multi-hops
                        away.
                      type: boolean
                    holdTimeSeconds:
                      description: |-
                        holdTimeSeconds is the requested BGP hold time in seconds, per RFC4271.
                        Defaults to 180.
                      format: int64
                      type: integer
                    keepaliveTimeSeconds:
                      description: |-
                        keepaliveTimeSeconds is the requested BGP keepalive time in seconds, per RFC4271.
                        Defaults to 60.
                      format: int64
                      type: integer
                    password:
                      description: |-
                        password to be used for establishing the BGP session.
                        Password and PasswordSecret are mutually exclusive.
                      type: string
                    passwordSecret:
                      description: |-
                        passwordSecret is name of the authentication secret for the neighbor.
                        the secret must be of type "kubernetes.io/basic-auth", and created in the
                        same namespace as the perouter daemon. The password is stored in the
                        secret as the key "password".
                        Password and PasswordSecret are mutually exclusive.
                      type: string
                    port:
                      description: |-
                        port is the port to dial when establishing the session.
                        Defaults to 179.
                      format: int32
                      maximum: 16384
                      minimum: 0
                      type: integer
                    type:
                      description: type is the AS type of the neighbor. Either ASN
                        or Type must be set.
                      enum:
                      - external
                      - internal
                      type: string
                  required:
                  - address
                  type: object
                  x-kubernetes-validations:
                  - message: either ASN or Type must be set
                    rule: has(self.asn) || has(self.type)
                  - message: ASN and Type cannot be set together
                    rule: '!has(self.asn) || !has(self.type)'
                  - message: holdTimeSeconds and keepaliveTimeSeconds must be both
                      set or both unset
                    rule: has(self.holdTimeSeconds) == has(self.keepaliveTimeSeconds)
                  - message: holdTimeSeconds must be 0 or >=3
                    rule: '!has(self.holdTimeSeconds) || self.holdTimeSeconds == 0
                      || self.holdTimeSeconds >= 3'
                  - message: keepaliveTimeSeconds must be lower than or equal to holdTimeSeconds
                    rule: '!has(self.holdTimeSeconds) || !has(self.keepaliveTimeSeconds)
                      || self.keepaliveTimeSeconds <= self.holdTimeSeconds'
                minItems: 1
                type: array
                x-kubernetes-list-type: atomic
              nics:
                description: |-
                  nics is the list of physical nics to move under the PERouter namespace to connect
                  to external routers. This field is optional when using Multus networks for TOR connectivity.
                items:
                  maxLength: 15
                  pattern: ^[a-zA-Z][a-zA-Z0-9._-]*$
                  type: string
                type: array
                x-kubernetes-list-type: atomic
              nodeSelector:
                description: |-
                  nodeSelector specifies which nodes this Underlay applies to.
                  If empty or not specified, applies to all nodes (backward compatible).
                  Multiple Underlays with overlapping node selectors will be rejected.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              routeridcidr:
                default: 10.0.0.0/24
                description: routeridcidr is the ipv4 cidr to be used to assign a
                  different routerID on each node.
                type: string
            required:
            - asn
            type: object
          status:
            description: status defines the observed state of Underlay.
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null
